{{define "title"}}Upload · Photo Library{{end}}

{{define "content"}}
<div class="page-header">
  <h1 class="page-title">Upload a photo</h1>
</div>

<div class="login-wrap">
  <div class="login-card">

    {{if .Error}}
    <div class="form-error" role="alert">{{.Error}}</div>
    {{end}}

    {{if .Success}}
    <div class="form-success" role="status">{{.Success}}</div>
    {{end}}

    <form class="login-form" method="POST" action="/upload" enctype="multipart/form-data">
      <div class="form-field">
        <label for="file">Photo</label>
        <input type="file" id="file" name="file"
               accept="image/*" required>
        <p class="text-muted">JPEG, PNG, HEIC, or RAW formats. Max 200 MB.</p>
      </div>

      <div class="form-field">
        <label>Visibility</label>
        <div class="visibility-selector">
          <label class="visibility-option">
            <input type="radio" name="visibility" value="private">
            <span class="vis-icon">🔒</span>
            <span class="vis-label">Private</span>
            <span class="vis-desc">Only you</span>
          </label>
          <label class="visibility-option selected">
            <input type="radio" name="visibility" value="household" checked>
            <span class="vis-icon">👥</span>
            <span class="vis-label">Household</span>
            <span class="vis-desc">All users</span>
          </label>
          <label class="visibility-option">
            <input type="radio" name="visibility" value="published">
            <span class="vis-icon">🌐</span>
            <span class="vis-label">Published</span>
            <span class="vis-desc">Everyone</span>
          </label>
        </div>
        <p class="text-muted">RAW files are always private regardless of this setting.</p>
      </div>

      <button type="submit" class="btn btn-primary">Upload</button>
    </form>

  </div>
</div>
{{end}}

<script>
(function () {
  document.querySelectorAll('.visibility-selector input[type="radio"]').forEach(function (radio) {
    radio.addEventListener('change', function () {
      document.querySelectorAll('.visibility-option').forEach(function (opt) {
        opt.classList.remove('selected');
      });
      radio.closest('.visibility-option').classList.add('selected');
    });
  });
})();
</script>
